<!DOCTYPE html>

<html>
<head>
    <title>Adaptive Educational RAG Agent</title>
</head>

<body>

<h1>Adaptive Educational RAG Agent</h1>

<input
    type="text"
    id="query"
    placeholder="Ask a question..."
    size="60"
>

<button onclick="askQuestion()">
    Ask
</button>

<hr>

<div id="answer"></div>

<script>

    async function askQuestion() {

        const query =
            document.getElementById("query").value;

        const response =
            await fetch(`/ask?query=${encodeURIComponent(query)}`);

        const data =
            await response.json();

        document.getElementById("answer").innerHTML =
            `<h3>Strategy:</h3>
             ${data.strategy}
             <br><br>
             <h3>Answer:</h3>
             ${data.answer}`;
    }

</script>

</body>
</html>
